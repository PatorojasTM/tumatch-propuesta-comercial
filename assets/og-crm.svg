<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#1B2B3E"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8307A"/>
      <stop offset="100%" stop-color="#9333EA"/>
    </linearGradient>
    <radialGradient id="glow1" cx="15%" cy="20%" r="45%">
      <stop offset="0%" stop-color="#E8307A" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#E8307A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="80%" r="45%">
      <stop offset="0%" stop-color="#9333EA" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#9333EA" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <g transform="translate(80, 80)">
    <rect width="72" height="72" rx="16" fill="url(#brand)"/>
    <text x="36" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="36" font-weight="700" fill="#FAF8F4">TM</text>
  </g>
  <text x="172" y="128" font-family="Georgia, serif" font-size="28" font-weight="600" fill="#FAF8F4">TuMatch · CRM</text>

  <!-- Badge -->
  <g transform="translate(80, 190)">
    <rect width="320" height="38" rx="19" fill="rgba(232, 48, 122, 0.15)" stroke="rgba(232, 48, 122, 0.4)" stroke-width="1"/>
    <circle cx="22" cy="19" r="4" fill="#E8307A"/>
    <text x="40" y="25" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="3" fill="#E8307A">PRELANZAMIENTO · PROMO OXÍGENO</text>
  </g>

  <text x="80" y="320" font-family="Georgia, serif" font-size="58" font-weight="700" fill="#FAF8F4">Más que un CRM.</text>
  <text x="80" y="390" font-family="Georgia, serif" font-size="58" font-weight="700" fill="url(#brand)">+40 herramientas</text>
  <text x="80" y="460" font-family="Georgia, serif" font-size="58" font-weight="700" fill="#FAF8F4">revolucionarias.</text>

  <g transform="translate(80, 540)">
    <circle cx="16" cy="16" r="6" fill="#E8307A"/>
    <text x="36" y="22" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#cbd5e1">Pagas 6 meses, usas 8 · Setup y migración gratis</text>
  </g>

  <text x="1120" y="580" text-anchor="end" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#94a3b8">tumatchinmobiliario.cl</text>
